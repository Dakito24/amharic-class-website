services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: amharic-server
    expose:
      - "3001"
    volumes:
      - amharic-db:/monorepo/server/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/monorepo/server/data/amharic.db
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: amharic-client
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - ORIGIN=http://localhost:8000
    depends_on:
      - server
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: amharic-nginx
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    restart: unless-stopped

volumes:
  amharic-db:
    driver: local
