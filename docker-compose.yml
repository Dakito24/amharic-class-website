version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: amharic-server
    expose:
      - "3001"
    volumes:
      - amharic-db:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/amharic.db
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: amharic-client
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - ORIGIN=http://localhost
    depends_on:
      - server
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: amharic-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    restart: unless-stopped

volumes:
  amharic-db:
    driver: local
